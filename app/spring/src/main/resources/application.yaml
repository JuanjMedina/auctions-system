spring:
  application:
    name: auctions-system
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
  allowed-headers: ${CORS_ALLOWED_HEADERS:*}
  allow-credentials: ${CORS_ALLOW_CREDENTIALS:true}
  max-age-seconds: ${CORS_MAX_AGE_SECONDS:3600}

rate-limit:
  enabled: ${RATE_LIMIT_ENABLED:true}
  capacity: ${RATE_LIMIT_CAPACITY:5}
  refill-duration-seconds: ${RATE_LIMIT_REFILL_DURATION_SECONDS:60}
  paths: ${RATE_LIMIT_PATHS:/auth/login,/auth/register,/wallets/me/withdraw}
